# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: com.alice.disbcompiler.zdisbcompiler
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://vhostpd5.awscloud.msg.de:8443
          client: '900'
          
        app:
          name: /ALUI/EK_DC_APP_UI
          description: Disbursement Compiler Fiori Application
          package: /ALICE/EK_APP
          transport: PD5K900997
        exclude:
          - /test/
